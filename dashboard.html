<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Dashboard Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- ================== LIBRERÍAS ================== -->
<script src="https://unpkg.com/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.29/dist/jspdf.plugin.autotable.min.js"></script>

<style>
/* ================= VARIABLES ================= */

:root{
 --bg:#f8fafc;
 --card:#ffffff;
 --txt:#0f172a;
 --muted:#64748b;
 --pri:#14b8a6;
 --pri-dark:#0d9488;
 --border:#cbd5e1;
 --danger:#dc2626;
 --warning:#eab308;
 --success:#16a34a;
 --info:#2563eb;
}

/* ================= BASE ================= */

*{box-sizing:border-box}

body{
 margin:0;
 font-family:Inter,Arial,Helvetica,sans-serif;
 background:var(--bg);
 color:var(--txt);
 padding:16px;
}

h2{
 margin:0 0 14px 0;
 font-weight:700;
}

/* ================= KPI ================= */

#kpis{
 display:grid;
 grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
 gap:12px;
 margin-bottom:16px;
}

.kpi{
 background:var(--card);
 padding:14px;
 border-radius:14px;
 box-shadow:0 6px 16px rgba(0,0,0,.08);
}

.kpi-title{
 font-size:12px;
 color:var(--muted);
}

.kpi-value{
 font-size:22px;
 font-weight:700;
 margin-top:4px;
}

/* ================= FILTROS ================= */

.filters{
 display:flex;
 gap:8px;
 flex-wrap:wrap;
 margin-bottom:14px;
}

input,select{
 padding:8px 10px;
 border-radius:10px;
 border:1px solid var(--border);
 font-size:13px;
 background:#fff;
}

/* ================= BOTONES ================= */

button{
 padding:8px 12px;
 border-radius:10px;
 border:0;
 background:var(--pri);
 color:#fff;
 font-weight:600;
 cursor:pointer;
 position:relative;
 font-size:13px;
 transition:.2s;
}

button:hover{
 background:var(--pri-dark);
 transform:translateY(-1px);
}

/* ================= LOADER BOTON ================= */

button.loading{
 pointer-events:none;
 opacity:.8;
}

button.loading::after{
 content:"";
 width:14px;
 height:14px;
 border:3px solid #fff;
 border-top-color:transparent;
 border-radius:50%;
 position:absolute;
 right:8px;
 top:50%;
 transform:translateY(-50%);
 animation:spin .8s linear infinite;
}

@keyframes spin{
 to{transform:translateY(-50%) rotate(360deg)}
}

/* ================= TABLA ================= */

.table-scroll{
 max-height:70vh;
 overflow:auto;
 border-radius:16px;
}

table{
 width:100%;
 border-collapse:collapse;
 background:var(--card);
 box-shadow:0 10px 30px rgba(0,0,0,.08);
 border-radius:16px;
 overflow:hidden;
}

th,td{
 padding:7px 10px;
 border-bottom:1px solid var(--border);
 font-size:13px;
 line-height:1.2;
 white-space:nowrap;
}

th{
 color:var(--muted);
 position:sticky;
 top:0;
 background:#fff;
 font-size:12px;
 font-weight:600;
}

tbody tr{
 transition:.2s;
}

tbody tr:hover{
 background:#f1f5f9;
}

/* ================= ACCIONES ================= */

.actions{
 display:flex;
 gap:4px;
}

.actions button{
 width:28px;
 height:28px;
 padding:0;
 display:flex;
 align-items:center;
 justify-content:center;
 font-size:14px;
}

/* ================= FOTO ================= */

.foto-thumb{
 width:38px;
 height:38px;
 object-fit:cover;
 border-radius:6px;
 border:1px solid var(--border);
 cursor:pointer;
}

/* ================= ICONO PDF ================= */

.icon-pdf{
 display:inline-flex;
 align-items:center;
 justify-content:center;
 width:28px;
 height:28px;
 border-radius:6px;
 background:#dc2626;
 color:#fff;
 font-size:14px;
 text-decoration:none;
 transition:.2s;
}

.icon-pdf:hover{
 background:#b91c1c;
 transform:scale(1.05);
}

/* ================= ALERTAS ================= */

.alerta{
 padding:4px 10px;
 border-radius:8px;
 font-size:12px;
 font-weight:600;
}

.alerta-verde{
 background:#dcfce7;
 color:#166534;
}

.alerta-amarillo{
 background:#fef9c3;
 color:#854d0e;
}

.alerta-rojo{
 background:#fee2e2;
 color:#991b1b;
}

.alerta-azul{
 background:#dbeafe;
 color:#1e40af;
}

/* ================= SEMAFORO ================= */

.sem-verde{
 background:#16a34a;
 color:#fff;
 padding:3px 8px;
 border-radius:6px;
 font-size:11px
}

.sem-amarillo{
 background:#eab308;
 color:#fff;
 padding:3px 8px;
 border-radius:6px;
 font-size:11px
}

.sem-rojo{
 background:#dc2626;
 color:#fff;
 padding:3px 8px;
 border-radius:6px;
 font-size:11px
}

.sem-azul{
 background:#2563eb;
 color:#fff;
 padding:3px 8px;
 border-radius:6px;
 font-size:11px
}

/* ================= MODAL ================= */

.modal{
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.65);
 display:none;
 align-items:center;
 justify-content:center;
 z-index:9999;
}

/* modal más ancho en escritorio */

.modal-content{
 background:#fff;
 padding:24px;
 border-radius:16px;
 width:100%;
 max-width:600px;
 max-height:90vh;
 overflow:auto;
 box-shadow:0 20px 60px rgba(0,0,0,.25);
}

/* ================= FORM ================= */

#modalForm input,
#modalForm select{
 width:100%;
 display:block;
 margin-bottom:10px;
}

/* layout escritorio */

@media(min-width:900px){

#modalForm .modal-content{
 display:grid;
 grid-template-columns:repeat(2,1fr);
 gap:12px;
}

#modalForm h3{
 grid-column:1/-1;
}

}

/* ================= FOTO GRANDE ================= */

.foto-grande{
 width:100%;
 max-height:75vh;
 object-fit:contain;
 border-radius:16px;
}

/* ================= MAPA ================= */

.map-frame{
 width:90vw;
 max-width:1000px;
 height:70vh;
 border:0;
 border-radius:16px;
}

/* ================= TARJETAS MOBILE ================= */

.mobile-list{
 display:none;
}

.card{
 background:#fff;
 padding:14px;
 border-radius:14px;
 box-shadow:0 6px 16px rgba(0,0,0,.08);
 margin-bottom:12px;
 font-size:13px;
}

.card-title{
 font-size:15px;
 font-weight:700;
 margin-bottom:6px;
 display:flex;
 justify-content:space-between;
}
@media(max-width:768px){

body{
 padding:10px;
}

/* ocultar tabla */

.table-scroll{
 display:none;
}

/* mostrar tarjetas */

.mobile-list{
 display:flex;
 flex-direction:column;
 gap:12px;
}

/* TARJETAS */

.card{
 width:100%;
 max-width:100%;
}

/* KPI EN VERTICAL */

#kpis{
 display:flex;
 flex-direction:column;
 gap:10px;
}

.kpi{
 width:100%;
}


/* ================= BOTON TRASLADO ================= */

.btn-traslado{
 background:#2563eb;
 color:#fff;
 border:0;
 border-radius:8px;
 padding:6px 10px;
 font-size:13px;
 font-weight:600;
 display:flex;
 align-items:center;
 gap:6px;
 cursor:pointer;
}

.btn-traslado:hover{
 background:#1d4ed8;
}

/* VER TRASLADO */

.btn-traslado-view{
 background:#dc2626;
 color:#fff;
 padding:6px 10px;
 border-radius:8px;
 font-size:13px;
 text-decoration:none;
 display:flex;
 align-items:center;
 gap:6px;
}

.btn-traslado-view:hover{
 background:#b91c1c;
}


/* filtros más compactos */

.filters{
 flex-direction:column;
}

.filters input,
.filters select,
.filters button{
 width:100%;
}

/* modal más pequeño */

.modal-content{
 width:95%;
 max-width:95%;
}

}

</style>

</head>

<body>

<h2>🚚 Tracking de Pedidos</h2>

<div id="kpis"></div>

<div class="filters">

<input id="search" placeholder="Buscar pedido o cliente">

<input type="date" id="fDesde">
<input type="date" id="fHasta">

<select id="fStatus">
<option value="">Todos</option>
<option>PENDIENTE</option>
<option>EN RUTA</option>
<option>RECIBIDO</option>
<option>ENTREGADO</option>
<option>CANCELADO</option>
</select>

<button id="btnNuevo">➕ Nuevo</button>
<button id="btnPDF">📄 PDF</button>
<button id="btnExcel">📊 Excel</button>
<button id="btnReload">🔄 Recargar</button>

</div>

<div class="table-scroll">

<table>

<thead>

<tr>
<th>Fecha</th>
<th>Pedido</th>
<th>Tipo</th>
<th>N°</th>
<th>Cliente</th>
<th>Dirección</th>
<th>Comuna</th>
<th>Transporte</th>
<th>Cajas</th>
<th>Estado</th>
<th>Entrega</th>
<th>Alerta</th>
<th>Atraso</th>
<th>Semáforo</th>
<th>Responsable</th>
<th>Foto</th>
<th>PDF</th>
<th>Traslado</th>
<th>Acciones</th>
</tr>

</thead>

<tbody id="tbody"></tbody>

</table>

<div id="pagination" style="
display:flex;
justify-content:center;
gap:10px;
margin-top:20px;
"></div>

</div>

<div id="mobileList" class="mobile-list"></div>

<!-- FOTO MODAL -->

<div class="modal" id="fotoModal">

<div class="modal-content">

<img id="fotoGrande" class="foto-grande">

<div style="display:flex;gap:10px;margin-top:15px">
<button id="btnDescargarFoto">Descargar</button>
<button id="btnCerrarFoto">Cerrar</button>
</div>

</div>

</div>

<!-- MAPA MODAL -->

<div class="modal" id="mapModal">

<div class="modal-content">

<iframe id="mapFrame" class="map-frame"></iframe>

<div style="margin-top:15px">
<button id="btnCerrarMapa">Cerrar</button>
</div>

</div>

</div>

<!-- FORMULARIO -->

<div class="modal" id="modalForm">

    <div class="modal-content">
    
    <h3 id="mtitle">Editar Pedido</h3>
    
    <label>Pedido</label>
    <input id="mPedido" placeholder="Número de pedido">
    
    <label>Tipo Documento</label>
    <select id="mTipoDoc">
    <option>BOLETA</option>
    <option>FACTURA</option>
    <option>GUIA</option>
    <option>ORDEN DE COMPRA</option>
    <option>NOTA DE VENTA</option>
    </select>
    
    <label>Número Documento</label>
    <input id="mNumeroDoc" placeholder="Número documento">
    
    <label>Cliente</label>
    <input id="mCliente" placeholder="Nombre del cliente">
    
    <label>Dirección</label>
    <input id="mDireccion" placeholder="Dirección entrega">
    
    <label>Comuna</label>
    <input id="mComuna" placeholder="Comuna">
    
    <label>Transporte</label>
    <input id="mTransporte" placeholder="Empresa transporte">
    
    <label>Cantidad de Cajas</label>
    <input id="mCajas" type="number" min="1">
    
    <label>Estado del Pedido</label>
    <select id="mStatus">
    <option>PENDIENTE</option>
    <option>EN RUTA</option>
    <option>RECIBIDO</option>
    <option>ENTREGADO</option>
    <option>CANCELADO</option>
    </select>
    
    <label>Fecha / Hora Entrega</label>
    <input id="mHoraEntrega" type="datetime-local">
    
    <label>Responsable</label>
    <input id="mResponsable" placeholder="Responsable entrega">
    
    <label>Observaciones</label>
    <input id="mObs" placeholder="Observaciones del pedido">
    
    <label>Subir Fotos</label>
    <input type="file" id="mFotos" accept="image/*" multiple>
    
    <label>Subir PDF</label>
    <input type="file" id="mPdf" accept="application/pdf" multiple>
    
    <div style="display:flex;gap:10px;margin-top:14px">
    
    <button id="btnGuardar">Guardar</button>
    <button id="btnCancelar">Cancelar</button>
    
    </div>
    
    </div>
    
    </div>

<script src="envio.js"></script>

</body>
</html>
