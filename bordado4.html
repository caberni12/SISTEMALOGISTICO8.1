<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<title>Dashboard Logístico</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

/* ================= VARIABLES ================= */

:root{
--bg:#f1f5f9;
--card:#ffffff;
--border:#e2e8f0;
--text:#0f172a;
--primary:#2563eb;
--radius:12px;
}

/* ================= BASE ================= */

body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:var(--bg);
color:var(--text);
}

/* ================= HEADER ================= */

header{
background:#0f172a;
color:white;
padding:14px 20px;
font-size:18px;
font-weight:bold;
}

/* ================= KPI ================= */

.kpi-container{
display:flex;
gap:20px;
padding:20px;
flex-wrap:wrap;
}

.kpi{
background:var(--card);
border-radius:50%;
width:110px;
height:110px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

.kpi h3{
margin:0;
font-size:24px;
color:var(--primary);
}

.kpi span{
font-size:12px;
}

/* ================= TARJETAS ================= */

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
gap:18px;
padding:20px;
}

.card{
background:var(--card);
border-radius:var(--radius);
padding:16px;
box-shadow:0 5px 12px rgba(0,0,0,.08);
display:flex;
flex-direction:column;
gap:10px;
}

.card h3{
margin:0;
font-size:16px;
}

.badge{
padding:4px 8px;
border-radius:6px;
font-size:12px;
color:white;
display:inline-block;
}

.nuevo{background:#2563eb;}
.ruta{background:#f59e0b;}
.entregado{background:#16a34a;}
.cancelado{background:#ef4444;}

.card-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.card-buttons button{
flex:1;
padding:8px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:13px;
}

.btn-view{background:#2563eb;color:white;}
.btn-edit{background:#f59e0b;color:white;}
.btn-pdf{background:#dc2626;color:white;}

/* ================= MODAL ================= */

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.5);
display:none;
align-items:center;
justify-content:center;
z-index:1000;
}

.modal.active{
display:flex;
}

.modal-content{
background:white;
width:95%;
max-width:650px;
border-radius:12px;
padding:25px;
max-height:90vh;
overflow:auto;
}

/* ================= FORMULARIO ================= */

.form-grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:18px;
margin-top:15px;
}

.form-group{
display:flex;
flex-direction:column;
gap:6px;
}

.form-group.full{
grid-column:1/3;
}

label{
font-size:13px;
font-weight:600;
}

input,select,textarea{
padding:11px;
border-radius:8px;
border:1px solid var(--border);
font-size:14px;
}

textarea{
resize:none;
height:80px;
}

/* ================= BOTONES ================= */

.modal-actions{
margin-top:20px;
display:flex;
justify-content:flex-end;
gap:10px;
}

button{
cursor:pointer;
}

/* ================= PDF ICON ================= */

.pdf-icon{
font-size:22px;
}

/* ================= RESPONSIVE ================= */

@media(max-width:600px){

.form-grid{
grid-template-columns:1fr;
}

.form-group.full{
grid-column:1;
}

}

</style>
</head>

<body>

<header>
Dashboard Logístico
</header>

<!-- KPI -->

<section class="kpi-container">

<div class="kpi">
<h3 id="kpiTotal">0</h3>
<span>Total</span>
</div>

<div class="kpi">
<h3 id="kpiRuta">0</h3>
<span>En Ruta</span>
</div>

<div class="kpi">
<h3 id="kpiEntregado">0</h3>
<span>Entregados</span>
</div>

<div class="kpi">
<h3 id="kpiCancelado">0</h3>
<span>Cancelados</span>
</div>

</section>

<!-- TARJETAS -->

<section class="grid" id="cardsContainer"></section>

<!-- MODAL DETALLE -->

<div class="modal" id="modalDetalle">

<div class="modal-content">

<h2>Detalle Pedido</h2>

<div id="detalleContenido"></div>

<div class="modal-actions">
<button onclick="cerrarModal('modalDetalle')">Cerrar</button>
</div>

</div>
</div>

<!-- MODAL EDITAR -->

<div class="modal" id="modalEditar">

<div class="modal-content">

<h2>Editar Pedido</h2>

<form id="formEditar">

<div class="form-grid">

<div class="form-group">
<label>Cliente</label>
<input type="text" id="cliente">
</div>

<div class="form-group">
<label>Teléfono</label>
<input type="text" id="telefono">
</div>

<div class="form-group">
<label>Dirección</label>
<input type="text" id="direccion">
</div>

<div class="form-group">
<label>Comuna</label>
<input type="text" id="comuna">
</div>

<div class="form-group">
<label>Repartidor</label>
<input type="text" id="repartidor">
</div>

<div class="form-group">
<label>Estado</label>
<select id="estado">
<option>Nuevo</option>
<option>En Ruta</option>
<option>Entregado</option>
<option>Cancelado</option>
</select>
</div>

<div class="form-group full">
<label>Observaciones</label>
<textarea id="observacion"></textarea>
</div>

</div>

<div class="modal-actions">
<button type="button" onclick="cerrarModal('modalEditar')">Cancelar</button>
<button type="submit">Guardar</button>
</div>

</form>

</div>
</div>

<!-- MODAL PDF -->

<div class="modal" id="modalPDF">

<div class="modal-content">

<h2>Documento PDF</h2>

<div id="pdfContainer"></div>

<div class="modal-actions">
<button onclick="cerrarModal('modalPDF')">Cerrar</button>
</div>

</div>
</div>

<script>

/* abrir modal */

function abrirModal(id){
document.getElementById(id).classList.add("active")
}

/* cerrar modal */

function cerrarModal(id){
document.getElementById(id).classList.remove("active")
}

</script>

</body>
</html>
